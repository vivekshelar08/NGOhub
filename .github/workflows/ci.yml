name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ngo_hub
          DIRECT_DATABASE_URL: postgresql://ci:ci@localhost:5432/ngo_hub
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret

      - run: npm run lint
